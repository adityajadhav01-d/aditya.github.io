<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Jadhav | Portfolio</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Gradient matching your image's dark purple/navy theme */
            background: linear-gradient(180deg, #1a0b2e 0%, #2d1b4d 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navigation Bar */
        nav {
            width: 100%;
            padding: 40px 80px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
        }

        /* Main Content (Hero Section) */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-grow: 1;
            padding-bottom: 100px;
        }

        .hero h1 {
            font-size: 75px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .hero h2 {
            font-size: 70px;
            margin: -10px 0 20px 0;
            font-weight: 800;
        }

        .tagline {
            font-size: 24px;
            color: #ccc;
            margin-bottom: 50px;
            font-weight: 400;
        }

        /* Button Styling */
        .buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 45px;
            font-size: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* Solid Button (Get In Touch) */
        .btn-touch {
            background-color: #fdf5e6; /* Cream/White color from image */
            color: #1a0b2e;
        }

        /* Outline Button (View My Work) */
        .btn-work {
            border: 2px solid white;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Aditya</div>
    </nav>

    <div class="hero">
        <h1>Welcome to My</h1>
        <h2>Website</h2>
        <p class="tagline">Passionate about teaching</p>

        <div class="buttons">
            <!-- Replace with your actual email -->
            <a href="mailto:aditya.jadhav@email.com" class="btn btn-touch">Get In Touch</a>
            <a href="#projects" class="btn btn-work">View My Work</a>
        </div>
    </div>

</body>
</html>
